name: Build AdventureInspector

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build project
        run: gradle build

      - name: Upload JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AdventureInspector
          path: build/libs/*.jar
